name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            ext: ""
            pkg: deb
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
            pkg: dmg
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            ext: .exe
            pkg: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            src/cscode/web/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          which cargo && cargo --version

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y webkit2gtk 2>$null || true

      - name: Create and activate Python venv
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install -e .

      - name: Build React frontend
        working-directory: src/cscode/web
        run: |
          npm ci
          npx vite build

      - name: Copy web dist to desktop
        shell: bash
        run: |
          mkdir -p desktop/dist desktop/src-tauri/web-dist
          cp -r src/cscode/web/dist/* desktop/dist/
          cp -r src/cscode/web/dist/* desktop/src-tauri/web-dist/

      - name: Bundle Python source for Tauri resources (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/python
          # Copy only Python files and web/dist, exclude node_modules
          cd src
          find cscode -path '*/web/dist' -prune -o -path '*/node_modules' -prune -o -type f \( -name '*.py' -o -name '*.json' -o -name '*.yaml' -o -name '*.yml' \) -print | cpio -pdm ../desktop/src-tauri/python/ 2>/dev/null || true
          # Copy web/dist separately
          mkdir -p ../desktop/src-tauri/python/cscode/web
          cp -r cscode/web/dist ../desktop/src-tauri/python/cscode/web/
          find ../desktop/src-tauri/python -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "Python source bundled"
          du -sh ../desktop/src-tauri/python/

      - name: Debug - check files
        shell: bash
        run: |
          echo "=== desktop/src-tauri/ dirs ==="
          ls -la desktop/src-tauri/
          echo "=== desktop/dist exists ==="
          test -f desktop/dist/index.html && echo "YES" || echo "NO"
          echo "=== tauri CLI check ==="
          cd desktop && npx tauri --version 2>&1 || echo "CLI NOT FOUND"

      - name: Install Tauri npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app
        working-directory: desktop
        shell: bash
        run: npx tauri build --verbose --bundles app 2>&1 || true

      - name: Fix DMG resources and create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="desktop/src-tauri/target/release/bundle/macos/CScode.app"
          DMG_DIR="desktop/src-tauri/target/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          
          # Ensure web-dist is in Resources
          if [ ! -d "$APP_PATH/Contents/Resources/web-dist" ]; then
            mkdir -p "$APP_PATH/Contents/Resources/web-dist"
            cp -r src/cscode/web/dist/* "$APP_PATH/Contents/Resources/web-dist/"
          fi
          
          # Ensure python source is in Resources
          if [ ! -d "$APP_PATH/Contents/Resources/python" ]; then
            mkdir -p "$APP_PATH/Contents/Resources/python"
            cp -r desktop/src-tauri/python/* "$APP_PATH/Contents/Resources/python/"
          fi
          
          # Create DMG from the corrected .app
          STAGING="/tmp/cscode-dmg-$$"
          mkdir -p "$STAGING"
          cp -rf "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          VERSION=$(grep '"version"' desktop/src-tauri/tauri.conf.json | cut -d'"' -f4)
          rm -f "$DMG_DIR"/*.dmg
          hdiutil create -volname "CScode" -srcfolder "$STAGING" -ov -format UDZO -imagekey zlib-level=9 "$DMG_DIR/CScode_${VERSION}_x64.dmg"
          rm -rf "$STAGING"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cscode-${{ runner.os }}-${{ matrix.pkg }}
          path: desktop/src-tauri/target/release/
          compression-level: 0

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List downloaded files
        run: |
          echo "=== Artifacts dir ==="
          ls -laR artifacts/ | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
